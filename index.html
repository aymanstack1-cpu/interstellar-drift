<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="A procedural deep-space generative art experience. No score. No goal. Just presence.">
  <meta name="theme-color" content="#020210">
  <title>Interstellar Drift</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #020210;
      touch-action: none;
    }
    canvas { display: block; cursor: none; }
    #hint {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: rgba(180,200,255,0.5); font-family: 'Courier New', monospace;
      font-size: 13px; letter-spacing: 3px; pointer-events: none;
      transition: opacity 1.5s; z-index: 10;
      text-align: center;
    }
    @media (max-width: 600px) {
      #hint { font-size: 11px; letter-spacing: 2px; bottom: 40px; }
    }
  </style>
</head>
<body>
  <div id="hint">MOVE TO DRIFT &nbsp;·&nbsp; TAP TO WARP</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
